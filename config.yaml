organization_id: "YOUR_ORG_ID"
billing_account: "YOUR_BILLING_ID"
default_region: "us-central1"

# ✅ FREE TIER MODULES - No additional charges
global_modules:
  enable_scc_standard: true # ✅ FREE - Security Command Center (free tier)
  enable_iap_access: true # ✅ FREE - Cloud IAP for Zero Trust SSH access
  # ❌ PAID MODULES BELOW (DISABLED BY DEFAULT) - Set to true only if needed!
  enable_cloud_nat: false # ❌ PAID ~$35/month - Outbound internet for private VMs
  enable_hybrid_connectivity: false # ❌ PAID ~$0.05/hour - Cloud VPN/Interconnect scaffolding
  enable_central_logging: false # ❌ PAID ~$7/month - BigQuery audit logs storage
  enable_private_service_connect: false # ❌ PAID ~$50/month - Private API endpoints
  enable_secret_manager: false # ❌ PAID ~$1/month - Secrets vault

# ❌ PAID ADVANCED MODULES (DISABLED BY DEFAULT) - Set to true only if needed!
advanced_modules:
  enable_centralized_ingress: false # ❌ PAID ~$18-50/month - Global load balancer ingress
  enable_egress_inspection: false # ❌ PAID ~$0.025/GB - Egress inspection (DLP)

enable_cicd_github: false

cicd:
  github_repository: "" # Example: acmecorp/platform-infra

hub:
  name: "hub"
  network_cidr: "10.0.0.0/20"
  iap_source_ranges:
    - "35.235.240.0/20"

service_catalog:
  base_apis:
    - "resource.googleapis.com"
    - "billing.googleapis.com"
    - "servicemanagement.googleapis.com"
    - "cloudresourcemanager.googleapis.com"
    - "compute.googleapis.com"
    - "storage.googleapis.com"
    - "storage-api.googleapis.com"
    - "iam.googleapis.com"
    - "logging.googleapis.com"
    - "monitoring.googleapis.com"
    - "securitycenter.googleapis.com"
    - "bigquery.googleapis.com"
    - "iap.googleapis.com"
  gcve_apis:
    - "vmwareengine.googleapis.com"
    - "servicenetworking.googleapis.com"
  gke_multicloud_apis:
    - "gkehub.googleapis.com"
    - "anthos.googleapis.com"
    - "container.googleapis.com"
  migration_apis:
    - "vmmigration.googleapis.com"
    - "storagetransfer.googleapis.com"
  service_networking_api: "servicenetworking.googleapis.com"
  security_center_api: "securitycenter.googleapis.com"

budget_alert_threshold: 1 # USD threshold for budget alerts (used in Phase 3)

spokes:
  - name: "sandbox"
    type: "greenfield"
    cost_mode: "strict_free" # Auto-disables any paid features requested below
    labels:
      env: "dev"
      department: "testing"

  - name: "enterprise-workloads"
    type: "greenfield"
    cost_mode: "custom_mix"
    labels:
      env: "prod"
      department: "it"
    workload_foundations:
      enable_gcve_networking: false # Sets up Private Services Access & /24 peering for VMware Engine
      enable_gke_multi_cloud: false # Adds Secondary IP ranges for Pods/Services & Anthos Fleet APIs for EKS
      enable_migration_factory: false # Opens firewall rules for Migrate to VMs & Storage Transfer appliances

  - name: "legacy-db-network"
    type: "brownfield_reference" # Uses data sources to peer with this network, doesn't try to manage it
    existing_network_id: "projects/old-proj/global/networks/legacy-vpc"
